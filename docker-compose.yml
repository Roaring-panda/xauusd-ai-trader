version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xauusd-trader-backend
    ports:
      - "5000:5000"
    environment:
      - MT5_LOGIN=${MT5_LOGIN}
      - MT5_PASSWORD=${MT5_PASSWORD}
      - MT5_SERVER=${MT5_SERVER}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - API_HOST=0.0.0.0
      - API_PORT=5000
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./ai/models:/app/models
    restart: unless-stopped
    networks:
      - trader-network

networks:
  trader-network:
    driver: bridge
